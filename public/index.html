<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pokuase Staff Database</title>
  <link rel="icon" type="image/png" href="/crown.png?v=2"/>
  <link rel="shortcut icon" type="image/png" href="/crown.png?v=2"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #1ab5b5;
      --teal-dark: #0e8f8f;
      --teal-light: #5ecece;
      --purple: #6b21a8;
      --white: #ffffff;
    }
    html, body { height: 100%; }
    body { font-family: 'Montserrat', sans-serif; }

    #landing {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(14,143,143,0.75) 0%, rgba(0,180,200,0.55) 50%, rgba(0,100,160,0.65) 100%),
        url('https://images.unsplash.com/photo-1504052434569-70ad5836ab65?w=1600&q=80') center/cover no-repeat;
      z-index: 0;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
      animation: shimmer 4s infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 18px 40px;
      gap: 14px;
    }
    .nav-logo {
      width: 72px; height: 72px;
      background: radial-gradient(circle at 40% 35%, #2a1e6e 0%, #1a0e50 60%, #0d0830 100%);
      border-radius: 50%;
      border: 3px solid var(--teal-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 20px rgba(26,181,181,0.5);
    }
    .nav-logo img { width: 100%; height: 100%; object-fit: contain; }
    .nav-brand span {
      display: block;
      font-family: 'Cinzel', serif;
      background: rgba(255,255,255,0.9);
      padding: 2px 8px;
    }
    .nav-brand span:first-child { font-size: 14px; font-weight: 700; color: var(--purple); letter-spacing: 1px; }
    .nav-brand span:last-child  { font-size: 11px; font-weight: 400; color: #333; letter-spacing: 2px; }

    .hero-content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
    }
    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(42px, 8vw, 100px);
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      animation: fadeUp 1s ease both;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .hero-subtitle {
      font-size: clamp(12px, 2.5vw, 18px);
      font-weight: 300;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 10px;
      animation: fadeUp 1s 0.2s ease both;
    }
    .hero-divider {
      width: 80px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--teal-light), transparent);
      margin: 30px auto;
      animation: fadeUp 1s 0.3s ease both;
    }
    .login-btn {
      display: inline-block;
      padding: 14px 48px;
      background: rgba(255,255,255,0.95);
      color: #222;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      animation: fadeUp 1s 0.5s ease both;
      transition: all 0.3s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .login-btn:hover {
      background: var(--teal);
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(26,181,181,0.5);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <section id="landing">
    <div class="hero-bg"></div>
    <nav class="nav">
      <div class="nav-logo"><img src="/crown.png" alt="Philadelphia Royal"/></div>
      <div class="nav-brand">
        <span>POKUASE STAFF</span>
        <span>DATABASE APPLICATION</span>
      </div>
    </nav>
    <div class="hero-content">
      <h1 class="hero-title">POKUASE KATAPOR</h1>
      <p class="hero-subtitle">DATABASE &nbsp;&bull;&nbsp; APPLICATION</p>
      <div class="hero-divider"></div>
      <a href="/login" class="login-btn">LOGIN NOW</a>
    </div>
  </section>
</body>
</html>
